<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --ocean-blue: #0077be;
            --gold: #d4af37;
            --dark-text: #333;
        }
        .loan-calc-container {
            max-width: 450px;
            margin: 20px auto;
            padding: 25px;
            border: 2px solid var(--gold);
            border-radius: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .loan-calc-container h2 {
            color: var(--ocean-blue);
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--dark-text); }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .calc-btn {
            width: 100%;
            padding: 15px;
            background: var(--ocean-blue);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        .calc-btn:hover { background: #005fa3; }
        .results {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: center;
        }
        .monthly-payment {
            font-size: 24px;
            color: var(--gold);
            font-weight: bold;
        }
        .hint { font-size: 12px; color: #777; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="loan-calc-container">
    <h2>Business Loan Calculator</h2>
    
    <div class="input-group">
        <label>Loan Amount ($)</label>
        <input type="number" id="amount" placeholder="e.g. 50000" value="50000">
    </div>

    <div class="input-group">
        <label>Loan Term (Years)</label>
        <select id="years">
            <option value="5">5 Years</option>
            <option value="10">10 Years</option>
            <option value="15">15 Years</option>
            <option value="20">20 Years</option>
        </select>
    </div>

    <div class="input-group">
        <label>Interest Rate (%)</label>
        <input type="number" id="interest" step="0.1" placeholder="e.g. 10" value="10">
    </div>

    <button class="calc-btn" onclick="calculateLoan()">Calculate Payment</button>

    <div class="results" id="result-box">
        <div>Estimated Monthly Payment:</div>
        <div class="monthly-payment" id="payment-display">$0.00</div>
        <div class="hint">Target Credit Score: 680+ for best rates.</div>
    </div>
</div>

<script>
function calculateLoan() {
    const principal = document.getElementById('amount').value;
    const calculatedInterest = document.getElementById('interest').value / 100 / 12;
    const calculatedPayments = document.getElementById('years').value * 12;

    // Monthly Payment Formula: [P x R x (1+R)^N] / [(1+R)^N - 1]
    const x = Math.pow(1 + calculatedInterest, calculatedPayments);
    const monthly = (principal * x * calculatedInterest) / (x - 1);

    if (isFinite(monthly)) {
        document.getElementById('payment-display').innerText = '$' + monthly.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    } else {
        document.getElementById('payment-display').innerText = 'Check your numbers, love!';
    }
}
</script>

</body>
</html>
