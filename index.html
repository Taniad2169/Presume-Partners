<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funding Calculator | WebSwan Media</title>
    <style>
        :root {
            /* The requested Ocean Blue */
            --brand-blue: #49b5d6; 
            --gold-accent: #d4af37;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
        }

        .calc-wrapper {
            width: 100%;
            max-width: 420px;
            background-color: var(--brand-blue);
            padding: 35px;
            border-radius: 24px;
            border: 4px solid var(--gold-accent);
            box-shadow: 0 20px 40px var(--shadow);
            color: var(--white);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 22px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .input-section {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 16px;
            color: #333;
            background-color: rgba(255, 255, 255, 0.95);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--gold-accent);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .calculate-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--gold-accent);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .calculate-btn:hover {
            background-color: #b8952d;
            transform: translateY(-2px);
        }

        .calculate-btn:active {
            transform: translateY(0);
        }

        .output-container {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .output-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .payment-value {
            font-size: 36px;
            font-weight: 800;
            margin: 5px 0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .disclaimer {
            font-size: 11px;
            line-height: 1.4;
            margin-top: 20px;
            opacity: 0.85;
            text-align: center;
            font-style: italic;
        }

        /* Responsive tweak */
        @media (max-width: 480px) {
            .calc-wrapper {
                padding: 25px;
                border-width: 3px;
            }
        }
    </style>
</head>
<body>

<div class="calc-wrapper">
    <h2>Business Funding</h2>
    
    <div class="input-section">
        <label for="amount">Loan Amount ($)</label>
        <input type="number" id="amount" value="50000" placeholder="e.g. 50000">
    </div>

    <div class="input-section">
        <label for="years">Term Length (Years)</label>
        <select id="years">
            <option value="5">5 Years</option>
            <option value="10">10 Years</option>
            <option value="15">15 Years</option>
            <option value="20">20 Years</option>
        </select>
    </div>

    <div class="input-section">
        <label for="interest">Estimated Rate (%)</label>
        <input type="number" id="interest" value="9.5" step="0.1" placeholder="e.g. 9.5">
    </div>

    <button class="calculate-btn" onclick="runCalculation()">Calculate Payment</button>

    <div class="output-container">
        <div class="output-label">Estimated Monthly Payment</div>
        <div class="payment-value" id="payment-result">$0.00</div>
    </div>

    <p class="disclaimer">
        *Best rates available for credit scores of 680+. Lower scores may be considered on a "stretch" basis with adjusted terms.
    </p>
</div>

<script>
    function runCalculation() {
        const p = parseFloat(document.getElementById('amount').value);
        const r = parseFloat(document.getElementById('interest').value) / 100 / 12;
        const n = parseFloat(document.getElementById('years').value) * 12;

        if (p > 0 && r > 0 && n > 0) {
            // Amortization Formula: M = P [ i(1 + i)^n ] / [ (1 + i)^n – 1]
            const x = Math.pow(1 + r, n);
            const monthlyPayment = (p * x * r) / (x - 1);
            
            document.getElementById('payment-result').innerText = 
                '$' + monthlyPayment.toLocaleString(undefined, {
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2
                });
        } else if (p > 0 && r === 0) {
            // Handle zero interest case
            document.getElementById('payment-result').innerText = '$' + (p / n).toFixed(2);
        } else {
            document.getElementById('payment-result').innerText = "Check values";
        }
    }

    // Run once on load to show initial value
    window.onload = runCalculation;
</script>

</body>
</html>
